services:
  metrics-exporter:
    build:
      context: .
      dockerfile: Dockerfile.exporter
    container_name: backup-metrics-exporter
    ports:
      - "9101:9101"
    volumes:
      - jenkins_home:/var/jenkins_home

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - metrics-exporter

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  jenkins_home:
    external: true